<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>
body{
    background:#1e1e2f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

input{
    padding:10px;
    width:220px;
    font-size:18px;
}

button{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    font-size:18px;
    margin-left:5px;
}

li{
    font-size:20px;
    margin:10px;
}
</style>
</head>

<body>

<h1>📝 My To-Do List</h1>

<input type="text" id="task" placeholder="Enter a task">

<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask(){

let task=document.getElementById("task").value;

if(task==""){
alert("Please enter a task!");
return;
}

let li=document.createElement("li");

li.innerHTML=task;

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";
}
</script>

</body>
</html>
