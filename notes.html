<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes App</title>

<style>

body{
background:#f5f5f5;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
box-sizing:border-box;
border-radius:10px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#notes{
margin-top:20px;
}

.note{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.delete{
background:#ff3b30;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>📝 Notes App</h1>

<textarea
id="noteInput"
placeholder="Write your note here..."></textarea>

<button onclick="addNote()">
Save Note
</button>

<div id="notes"></div>

<script>
  let notes = JSON.parse(localStorage.getItem("notes")) || [];

function displayNotes(){

let notesDiv = document.getElementById("notes");
notesDiv.innerHTML = "";

notes.forEach((note,index)=>{

notesDiv.innerHTML += `
<div class="note">
${note}
<br><br>
<button class="delete" onclick="deleteNote(${index})">
Delete
</button>
</div>
`;

});

}

function addNote(){

let input = document.getElementById("noteInput");

if(input.value.trim()==""){
return;
}

notes.push(input.value);

localStorage.setItem("notes",JSON.stringify(notes));

input.value="";

displayNotes();

}

function deleteNote(index){

notes.splice(index,1);

localStorage.setItem("notes",JSON.stringify(notes));

displayNotes();

}

displayNotes();

</script>

</body>
</html>
