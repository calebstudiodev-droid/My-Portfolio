<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App Pro</title>

<style>
body{
    background:#1e293b;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    font-size:40px;
}

input{
    width:280px;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:30px;
    font-size:24px;
    line-height:2;
}
</style>

</head>

<body>

<h1>🌤️ Weather App Pro</h1>

<input
type="text"
id="city"
placeholder="Enter city name">

<br>

<button onclick="showWeather()">
Search
</button>

<div id="result"></div>

<script>
  const apiKey = "efaebcdd036bfd09de3b0d51ab3a0d2b";

async function showWeather(){

const city = document.getElementById("city").value.trim();

if(city===""){
document.getElementById("result").innerHTML="❌ Please enter a city.";
return;
}

const url =
`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`;

try{

const response = await fetch(url);
const data = await response.json();

if(response.ok){

const icon =
`https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

document.getElementById("result").innerHTML = `
<p>📍 <b>City:</b> ${data.name}</p>

<img src="${icon}" width="100">

<p>🌡️ <b>Temperature:</b> ${data.main.temp}°C</p>

<p>☁️ <b>Weather:</b> ${data.weather[0].main}</p>

<p>💧 <b>Humidity:</b> ${data.main.humidity}%</p>

<p>🌬️ <b>Wind:</b> ${data.wind.speed} m/s</p>
`;

}else{

document.getElementById("result").innerHTML =
"❌ City not found.";

}

}catch(error){

document.getElementById("result").innerHTML =
"❌ Internet connection error.";

}

}
</script>

</body>
</html>
