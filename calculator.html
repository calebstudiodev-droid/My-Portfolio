<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator App</title>

<style>

body{
background:#121212;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
margin:0;
}

.calculator{
background:#1f1f1f;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
width:320px;
}

#display{
width:100%;
height:60px;
font-size:30px;
text-align:right;
margin-bottom:20px;
border:none;
border-radius:10px;
padding:10px;
box-sizing:border-box;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:60px;
font-size:22px;
border:none;
border-radius:10px;
cursor:pointer;
}

.number{
background:#333;
color:white;
}

.operator{
background:#ff9500;
color:white;
}

.clear{
background:#ff3b30;
color:white;
}

.equal{
background:#34c759;
color:white;
}

</style>

</head>

<body>

<div class="calculator">

<input
type="text"
id="display"
readonly>

<div class="buttons">
  <button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="operator" onclick="deleteLast()">⌫</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button class="number" onclick="appendValue('0')" style="grid-column:span 2;">0</button>
<button class="number" onclick="appendValue('.')">.</button>

</div>

</div>

<script>

const display=document.getElementById("display");

function appendValue(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function deleteLast(){
display.value=display.value.slice(0,-1);
}

function calculate(){
try{
display.value=eval(display.value);
}catch{
display.value="Error";
}
}

</script>

</body>
</html>
